# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.

config:
  verify: "npx tsc --noEmit && npm run lint"
  max_tasks_per_phase: 200
  quality_check_suppressions: []

state:
  task_number: 10
  phase: editor-discoverability
  phase_complete: true
  review_stage: pr_created
  review_complete: false
  retro_complete: false
  pr_number: 4
  status: running
  last_result: pass
  next_task: "[review] review-pr pr=4 auto=true"
  consecutive_fails: 0
  completed_stories:
    - US-D1
    - US-D2
